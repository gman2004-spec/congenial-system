<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Aula 13</title>
    <style>
        body{
            background-color: cornflowerblue;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;

        }
        .box-nav{
            background-color: gold;
            padding: 5px;
            border-radius: 15px;
        }
        .box{
            background: rgba(0, 0, 0, 0.6);
            position: absolute;
            top:50%;
            left:50%;
            transform: translate(-50%,-50%);
            padding: 15px;
            border-radius: 15px;
            color: white;
        }
        input{
            padding: 10px;
            border: none;
            outline:none;
            border-radius: 10px;
            font-size: 15px;
            width: 50%;
        }
        button{
            padding: 10px;
            border: none;
            outline: none;
            width: 50%;
            background-color: slateblue;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.5s;
        }
        button:hover{
            background-color: cornflowerblue;
        }
    </style>

</head>
<body>
    <div class="box-nav">
        <h1>EXERCÍCIO #13</h1>
        <h2>Disciplina de Algoritmos</h2>
        <p>Faça um algoritmo em javascript que imigra a média arimética dos números 8,9 e 7. A média dos números 4,5 e 6. as soma das duas médias</p>
    </div>
    
</body> 
    <script> 
            const media1 = (8 + 9 + 7) / 3;
            console.log('Média dos números 8, 9 e 7: ${media1}');

            const media2 = (4 + 5 + 6) / 3;
            console.log('Média dos números 4, 5 e 6: ${media2}');

            const somaMedias = media1 + media2;
            console.log('Soma das duas médias ${somaMedias}');

            const mediaMedias = media1 + media2;
            console.log('Média das médias: ${mediaMedias}');
    </script>    
</html>
