<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Aula 15</title>
    <style>
        body{
            background-color: cornflowerblue;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;

        }
        .box-nav{
            background-color: gold;
            padding: 5px;
            border-radius: 15px;
        }
        .box{
            background: rgba(0, 0, 0, 0.6);
            position: absolute;
            top:50%;
            left:50%;
            transform: translate(-50%,-50%);
            padding: 15px;
            border-radius: 15px;
            color: white;
        }
        input{
            padding: 10px;
            border: none;
            outline:none;
            border-radius: 10px;
            font-size: 15px;
            width: 50%;
        }
        button{
            padding: 10px;
            border: none;
            outline: none;
            width: 50%;
            background-color: slateblue;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.5s;
        }
        button:hover{
            background-color: cornflowerblue;
        }
    </style>

</head>
<body>
    <div class="box-nav">
        <h1>EXERCÍCIO #14</h1>
        <h2>Disciplina de Algoritmos</h2>
        <p>Faça um algoritmo em javascript que, dado o valor do salário de um usuário,
calcule a quantidade de salários mínimos que esse usuário ganha e imprima o
resultado. (1SM=R$1210,00)</p>
            <input type="number" id="salario" placeholder="Digite o valor do salario">
            <br></br>

            <button onclick="calcular()">Enviar</button>
    </div>
    
</body> 
    <script> 
        function calcular()
        {
         var valorSalario = parseFloat(document.querySelector('#salario').value);

         const salarioMinimo = 1210;
         const quantidadeSalariosMinimos = valorSalario / salarioMinimo;
         console.log(`Você ganha ${quantidadeSalariosMinimos.toFixed(2)} salários mínimos.`);
        }
    </script>    
</html>
