<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Eduardo Leal | 11</title>
    <style>
        body{
            background-color: cornflowerblue;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;

        }
        .box-nav{
            background-color: gold;
            padding: 5px;
            border-radius: 15px;
        }
        .box{
            background: rgba(0, 0, 0, 0.6);
            position: absolute;
            top:50%;
            left:50%;
            transform: translate(-50%,-50%);
            padding: 15px;
            border-radius: 15px;
            color: white;
        }
        input{
            padding: 10px;
            border: none;
            outline:none;
            border-radius: 10px;
            font-size: 15px;
            width: 50%;
        }
        button{
            padding: 10px;
            border: none;
            outline: none;
            width: 50%;
            background-color: slateblue;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.5s;
        }
        button:hover{
            background-color: cornflowerblue;
        }
    </style>

</head>
<body>
    <div class="box-nav">
        <h1>EXERCÍCIO #11</h1>
        <h2>Disciplina de Algoritmos</h2>
    </div>
    <div class="box">
        <p>Digite uma distância para calcular o valor gasto de combustivel de um carro durante um percurso. </p>
        <input type="number" id = 'Distancia' placeholder="Digite a distância percorrida">
        <br><br>

        <button onclick = 'calculo()'>Enviar</button>
    </div>
        
</body> 
    <script>
        function calculo()  
        {
            
            const ValorLitro = 6.50;
            const ConsumoLitro = 12;
            
            var DistanciaPercorrida = parseFloat(document.querySelector('#Distancia').value);
            
            const LitrosGastos = DistanciaPercorrida / ConsumoLitro;

            const ValorGasto = LitrosGastos * ValorLitro;

            alert(`Foram gastos ${LitrosGastos.toFixed(2)} Litros de combustível, totalizando R$ ${ValorGasto.toFixed(2)}.`);
            
            
        }





    </script>    


</html>
